<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}FileShare{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        "primary-hover": "#1d4ed8",
                    },
                    fontFamily: {
                        sans: ["Inter", "system-ui", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }

        /* Liquid Glass Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.45);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06),
                        inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.78);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .dark .glass-input {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Material Symbols config */
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Smooth theme transitions */
        *, *::before, *::after {
            transition: background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
    </style>
    {% block head %}{% endblock %}
    <!-- Inline theme init to prevent flash -->
    <script>
        (function(){
            var t = localStorage.getItem('fileshare-theme');
            if (t === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
</head>

<body class="min-h-screen bg-gradient-to-br from-white via-blue-50/60 to-blue-100/40 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">

        <!-- ── Navbar ── -->
        <header class="sticky top-0 z-50 glass">
            <div class="mx-auto flex max-w-6xl items-center justify-between px-4 sm:px-8 py-2.5">
                <a class="flex items-center gap-2.5 text-slate-900 dark:text-white select-none" href="{% url 'upload_page' %}">
                    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-white shadow-md shadow-primary/20">
                        <span class="material-symbols-rounded text-[18px]" style="font-variation-settings:'FILL' 1">cloud_upload</span>
                    </div>
                    <span class="text-lg font-bold tracking-tight">FileShare</span>
                </a>

                <nav class="flex items-center gap-2 sm:gap-3">
                    <a class="px-3.5 py-1.5 rounded-lg text-[13px] font-semibold transition-all {% if nav == 'send' %}bg-primary text-white shadow-md shadow-primary/25{% else %}text-slate-600 dark:text-slate-300 hover:bg-white/50 dark:hover:bg-white/10{% endif %}"
                       href="{% url 'upload_page' %}">Send</a>
                    <a class="px-3.5 py-1.5 rounded-lg text-[13px] font-semibold transition-all {% if nav == 'receive' %}bg-primary text-white shadow-md shadow-primary/25{% else %}text-slate-600 dark:text-slate-300 hover:bg-white/50 dark:hover:bg-white/10{% endif %}"
                       href="{% url 'receive' %}">Receive</a>

                    <!-- Dark / Light toggle -->
                    <button id="theme-toggle" type="button" aria-label="Toggle theme"
                            class="ml-1 flex h-9 w-9 items-center justify-center rounded-full glass text-slate-600 dark:text-slate-300 hover:scale-110 active:scale-95 transition-transform cursor-pointer">
                        <span class="material-symbols-rounded text-[20px]" id="theme-icon">dark_mode</span>
                    </button>
                </nav>
            </div>
        </header>

        <!-- ── Main ── -->
        <main class="flex flex-1 justify-center px-4 sm:px-6 py-3">
            <div class="flex w-full max-w-6xl flex-col">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Theme toggle logic -->
    <script>
        (function() {
            const html = document.documentElement;
            const btn  = document.getElementById('theme-toggle');
            const icon = document.getElementById('theme-icon');
            function sync() { icon.textContent = html.classList.contains('dark') ? 'light_mode' : 'dark_mode'; }
            sync();
            btn.addEventListener('click', function() {
                html.classList.toggle('dark');
                localStorage.setItem('fileshare-theme', html.classList.contains('dark') ? 'dark' : 'light');
                sync();
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
